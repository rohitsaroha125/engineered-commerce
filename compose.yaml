  backend:
    depends_on: 
      - db
    environment:
      - PORT=8010
      - DATABASE_URL=postgresql://rohit:secret123@db:5432/myapp
      - JWT_SECRET_KEY=hello_there_jwt_scret_see_this
      - REDIS_URL=redis://redis:6379
    build: ./backend
    ports:
      - 8010:8010
    develop:
      watch:
        - path: ./backend/package.json
          action: rebuild
        - path: ./backend/package-lock.json
          action: rebuild
        - path: ./backend
          target: /app
          action: sync

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: rohit
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: myapp
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/postgres_data/db/data

  redis:
        image: redis:latest
        ports:
            - 6379:6379
        volumes:
            - redis-data:/data
        environment:
            - REDIS_ARGS=--requirepass your_password_here --appendonly yes
        restart: unless-stopped

volumes:
  postgres_data:
  redis-data:
        driver: local

  